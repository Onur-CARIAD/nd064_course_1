namespace:
  name: sandbox

replicaCount: 1

image:
  repository: onurcariad/techtrends
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 4111
  targetPort: 7111
  protocol: TCP
  type: ClusterIP

containerPort: 7111

resources:
  requests:
    memory: 64Mi
    cpu: 250m
  limits:
    memory: 128Mi
    cpu: 500m

livenessProbe:
  path: /healthz

readinessProbe:
  path: /healthz
