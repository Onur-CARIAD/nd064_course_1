apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techtrends-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Onur-CARIAD/nd064_course_1.git
    targetRevision: HEAD
    path: project/helm/techtrends
    helm:
      valueFiles:
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true